{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANA — Message privé</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
{% csrf_token %}
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --p950:#1e0d17;--p700:#5e2f47;--p400:#9a5e79;
  --r500:#c26e8a;--r300:#dca8bc;--r100:#f2d8e4;--r50:#fce8f0;
  --blush:#fdf3f7;--txt:#1a0d14;--txt-m:#6b4a58;--txt-s:#9a7585;
  --white:#fff;--nav-h:60px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;background:var(--blush);color:var(--txt);display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{
  height:var(--nav-h);background:rgba(253,243,247,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(194,110,138,.12);
  display:flex;align-items:center;gap:12px;
  padding:0 clamp(14px,3vw,24px);flex-shrink:0;
}
.back-btn{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  cursor:pointer;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--txt-m);
  padding:6px 10px;border-radius:100px;transition:background .2s,color .2s;
}
.back-btn:hover{background:var(--r50);color:var(--r500);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.user-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--r300),var(--r500));
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:white;font-weight:500;
}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.88rem;font-weight:500;color:var(--p950);}
.user-status{font-size:.65rem;color:var(--txt-s);}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--r300);margin-right:4px;}

/* ── MESSAGES AREA ── */
.messages-area{
  flex:1;overflow-y:auto;padding:16px clamp(12px,3vw,24px);
  display:flex;flex-direction:column;gap:6px;
}
.messages-area::-webkit-scrollbar{width:3px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(194,110,138,.2);border-radius:3px;}

.bubble-wrap{display:flex;flex-direction:column;max-width:72%;}
.bubble-wrap.me{align-self:flex-end;align-items:flex-end;}
.bubble-wrap.other{align-self:flex-start;}
.bubble{
  padding:10px 14px;border-radius:18px;
  font-size:.82rem;line-height:1.55;word-break:break-word;
}
.bubble-wrap.me .bubble{
  background:var(--r500);color:white;
  border-radius:18px 18px 4px 18px;
}
.bubble-wrap.other .bubble{
  background:white;color:var(--txt);
  border:1px solid rgba(194,110,138,.12);
  border-radius:18px 18px 18px 4px;
  box-shadow:0 1px 4px rgba(107,47,71,.05);
}
.bubble-time{
  font-size:.6rem;color:var(--txt-s);margin-top:3px;
  display:flex;align-items:center;gap:3px;
}
.bubble-wrap.me .bubble-time{justify-content:flex-end;color:rgba(194,110,138,.7);}
.check{font-size:.65rem;letter-spacing:-2px;opacity:.55;}
.check.read{opacity:1;color:#5cb85c;}

.date-sep{
  display:flex;align-items:center;gap:10px;margin:10px 0;
  font-size:.62rem;color:var(--txt-s);text-transform:uppercase;letter-spacing:2px;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(194,110,138,.12);}

.empty-msg{text-align:center;margin-top:40px;color:var(--txt-s);font-size:.82rem;line-height:1.7;}
.empty-msg span{font-size:2rem;display:block;margin-bottom:10px;opacity:.4;}

/* ── INPUT ── */
.input-area{
  padding:10px clamp(12px,3vw,24px);
  border-top:1px solid rgba(194,110,138,.1);
  background:rgba(253,243,247,.96);flex-shrink:0;
  display:flex;align-items:flex-end;gap:10px;
}
.msg-input{
  flex:1;border:1.5px solid rgba(194,110,138,.2);border-radius:22px;
  padding:10px 16px;font-family:'Jost',sans-serif;font-size:.82rem;
  outline:none;resize:none;max-height:110px;overflow-y:auto;
  background:white;color:var(--txt);line-height:1.5;
  transition:border-color .2s;
}
.msg-input:focus{border-color:var(--r500);}
.send-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--r500),var(--p700));
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s,transform .15s;
}
.send-btn:hover{opacity:.88;transform:scale(1.05);}
.send-btn svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <div class="user-av" id="userAv">{{ other_initial }}</div>
  <div class="user-info">
    <div class="user-name">{{ other_name }}</div>
    <div class="user-status"><span class="status-dot"></span>Message anonyme · Privé</div>
  </div>
</div>

<div class="messages-area" id="messagesArea">
  <div class="empty-msg" id="emptyMsg" style="display:none">
    <span>💬</span>
    Commence la conversation avec <strong>{{ other_name }}</strong>
  </div>
</div>

<div class="input-area">
  <textarea class="msg-input" id="msgInput" rows="1"
    placeholder="Écris un message…"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
  <button class="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
const OTHER_USER_ID = {{ other_user_id }};
const CSRF = document.querySelector('[name=csrfmiddlewaretoken]').value;
let lastId = 0;
let pollTimer = null;

async function loadMessages(initial) {
  try {
    const res = await fetch('/api/dm/' + OTHER_USER_ID + '/');
    const data = await res.json();
    if (data.error) return;
    const area = document.getElementById('messagesArea');
    const msgs = data.messages || [];
    let added = 0;
    msgs.forEach(m => {
      if (m.id > lastId) {
        lastId = m.id;
        area.insertBefore(buildBubble(m), document.getElementById('emptyMsg'));
        added++;
      } else {
        // Update read status of existing bubbles
        const existing = area.querySelector('[data-id="' + m.id + '"]');
        if (existing && m.read) {
          const check = existing.querySelector('.check');
          if (check) check.classList.add('read');
        }
      }
    });
    if (added > 0 || initial) area.scrollTop = area.scrollHeight;
    if (initial) {
      if (msgs.length === 0) document.getElementById('emptyMsg').style.display = 'block';
    }
  } catch(e) {}
}

function buildBubble(m) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + (m.is_me ? 'me' : 'other');
  wrap.dataset.id = m.id;
  const checkHtml = m.is_me
    ? '<span class="check' + (m.read ? ' read' : '') + '">✓✓</span>' : '';
  wrap.innerHTML =
    '<div class="bubble">' + esc(m.content) + '</div>' +
    '<div class="bubble-time">' + m.sent_at + checkHtml + '</div>';
  return wrap;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  input.style.height = '';
  document.getElementById('emptyMsg').style.display = 'none';
  try {
    const res = await fetch('/api/dm/' + OTHER_USER_ID + '/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
      body: JSON.stringify({content}),
    });
    const m = await res.json();
    if (m.error) return;
    if (m.id > lastId) {
      lastId = m.id;
      const area = document.getElementById('messagesArea');
      area.insertBefore(buildBubble(m), document.getElementById('emptyMsg'));
      area.scrollTop = area.scrollHeight;
    }
  } catch(e) {}
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initial load then poll every 3s
loadMessages(true);
pollTimer = setInterval(() => loadMessages(false), 3000);
</script>
</body>
</html>
