{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANA — Créer un compte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rose-pale:      #fff7f9;
            --rose-clair:     #ffecf4;
            --rose-doux:      #ffd9ec;
            --rose-tendre:    #ffc0d6;
            --rose-principal: #c2718f;
            --rose-fonce:     #a05870;
            --rose-profond:   #7d3f55;
            --texte-doux:     #9a6278;
            --texte-leger:    #c4a0b0;
            --blanc-glass:    rgba(255,255,255,0.62);
            --success:        #4caf8a;
            --error:          #d9534f;
        }

        html { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #fdf0f5;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 24px 16px;
        }

        /* ── Background mesh ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(255,192,215,0.5) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(255,167,200,0.35) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 55% 50%, rgba(255,230,242,0.4) 0%, transparent 65%),
                linear-gradient(160deg, #fff0f6 0%, #fde8f2 40%, #f9d9e9 100%);
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: min(560px, 95vw);
            height: min(560px, 95vw);
            background: radial-gradient(circle at 35% 40%, rgba(255,192,215,0.55) 0%, transparent 65%);
            top: -18%; left: -12%;
            filter: blur(60px);
            animation: drift1 22s ease-in-out infinite;
        }
        .orb-2 {
            width: min(420px, 85vw);
            height: min(420px, 85vw);
            background: radial-gradient(circle at 65% 60%, rgba(220,130,165,0.35) 0%, transparent 65%);
            bottom: -12%; right: -10%;
            filter: blur(55px);
            animation: drift2 26s ease-in-out infinite;
        }
        .orb-3 {
            width: min(280px, 60vw);
            height: min(280px, 60vw);
            background: radial-gradient(circle, rgba(255,210,230,0.45) 0%, transparent 70%);
            top: 40%; left: 45%;
            filter: blur(45px);
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(25px,18px) scale(1.06); }
            66%      { transform: translate(-12px,30px) scale(0.97); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(-20px,-14px) scale(1.05); }
            66%      { transform: translate(15px,-25px) scale(0.98); }
        }
        @keyframes drift3 {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(-30px,20px); }
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 980px;
            background: rgba(255,255,255,0.48);
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            border: 1px solid rgba(255,255,255,0.82);
            border-radius: 36px;
            box-shadow:
                0 0 0 1.5px rgba(255,255,255,0.6) inset,
                0 2px 0 rgba(255,255,255,0.9) inset,
                0 40px 80px rgba(160,88,112,0.16),
                0 8px 20px rgba(160,88,112,0.1);
            overflow: hidden;
            animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Left image panel ── */
        .panel-image {
            flex: 0 0 44%;
            position: relative;
            overflow: hidden;
        }

        .panel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: transform 8s ease;
        }
        .panel-image:hover img { transform: scale(1.04); }

        /* Frosted edge blend */
        .panel-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right,
                transparent 55%,
                rgba(255,245,250,0.15) 75%,
                rgba(255,240,248,0.55) 100%
            );
            z-index: 2;
        }

        .panel-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            text-align: center;
            padding: 40px 20px 28px;
            background: linear-gradient(to top,
                rgba(220,130,165,0.72) 0%,
                rgba(255,200,225,0.28) 60%,
                transparent 100%
            );
        }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 3.8vw, 3rem);
            font-weight: 300;
            color: #fff;
            letter-spacing: 14px;
            display: block;
            text-shadow: 0 2px 24px rgba(140,60,90,0.35), 0 0 40px rgba(255,255,255,0.5);
        }

        .logo-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.78rem;
            font-style: italic;
            color: rgba(255,255,255,0.85);
            letter-spacing: 4px;
            margin-top: 4px;
            display: block;
            text-shadow: 0 1px 8px rgba(140,60,90,0.3);
        }

        /* decorative pill */
        .panel-badge {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.68rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Right form panel ── */
        .panel-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 44px 52px 44px 48px;
            overflow-y: auto;
        }

        .form-eyebrow {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 4.5px;
            color: var(--rose-principal);
            opacity: 0.7;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-eyebrow::before {
            content: '';
            display: inline-block;
            width: 28px; height: 1px;
            background: linear-gradient(to right, transparent, var(--rose-principal));
            opacity: 0.6;
        }

        .form-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.9rem, 3.2vw, 2.6rem);
            font-weight: 300;
            color: var(--rose-profond);
            line-height: 1.12;
            margin-bottom: 10px;
            animation: slideUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
        }
        .form-title em {
            font-style: italic;
            color: var(--rose-principal);
            font-weight: 400;
        }

        .form-desc {
            font-size: 0.86rem;
            color: var(--texte-doux);
            font-weight: 300;
            line-height: 1.65;
            margin-bottom: 26px;
            opacity: 0.88;
            animation: slideUp 0.7s 0.22s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Fields ── */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 22px;
            animation: slideUp 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }

        .field-row {
            display: flex;
            gap: 12px;
        }
        .field-row .field { flex: 1; }

        .field { display: flex; flex-direction: column; gap: 7px; }

        .field label {
            font-size: 0.69rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--texte-doux);
            font-weight: 500;
            padding-left: 2px;
            transition: color 0.3s;
        }
        .field:focus-within label { color: var(--rose-principal); }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: var(--rose-principal);
            opacity: 0.4;
            font-size: 0.95rem;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1;
            line-height: 1;
        }

        .field input {
            width: 100%;
            padding: 13px 18px 13px 44px;
            background: rgba(255,255,255,0.55);
            border: 1.5px solid rgba(194,113,143,0.18);
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            color: var(--rose-profond);
            outline: none;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
            box-shadow: 0 2px 8px rgba(194,113,143,0.06) inset;
        }

        .field input::placeholder {
            color: rgba(194,113,143,0.35);
            font-weight: 300;
        }

        .field input:focus {
            border-color: rgba(194,113,143,0.5);
            background: rgba(255,255,255,0.82);
            box-shadow:
                0 0 0 4px rgba(194,113,143,0.1),
                0 2px 8px rgba(194,113,143,0.06) inset;
        }
        .input-wrap:focus-within .input-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Validation states */
        .field input.is-valid {
            border-color: rgba(76,175,138,0.5);
            background: rgba(255,255,255,0.8);
        }
        .field input.is-valid + .field-feedback { color: var(--success); }

        .field input.is-error {
            border-color: rgba(217,83,79,0.45);
            box-shadow: 0 0 0 4px rgba(217,83,79,0.08);
        }

        /* Field-level feedback */
        .field-feedback {
            font-size: 0.74rem;
            color: var(--texte-leger);
            padding-left: 4px;
            min-height: 1.1em;
            transition: color 0.3s;
        }
        .field-feedback.error { color: var(--error); }
        .field-feedback.success { color: var(--success); }

        /* Validation icon on input */
        .input-status {
            position: absolute;
            right: 44px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1;
        }
        .field input.is-valid ~ .input-status,
        .field input.is-error ~ .input-status { opacity: 1; }

        /* Password strength bar */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 2px;
        }
        .strength-seg {
            flex: 1;
            height: 3px;
            border-radius: 4px;
            background: rgba(194,113,143,0.15);
            transition: background 0.4s ease;
        }
        .strength-seg.active-1 { background: var(--error); }
        .strength-seg.active-2 { background: #e8a838; }
        .strength-seg.active-3 { background: var(--success); }

        .toggle-pass {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--rose-principal);
            opacity: 0.4;
            font-size: 0.88rem;
            padding: 6px;
            transition: opacity 0.3s;
            line-height: 1;
            z-index: 2;
            -webkit-tap-highlight-color: transparent;
            border-radius: 6px;
        }
        .toggle-pass:hover { opacity: 0.8; }
        .toggle-pass:focus-visible {
            outline: 2px solid var(--rose-principal);
            opacity: 1;
        }

        /* ── Alerts ── */
        .alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.83rem;
            line-height: 1.5;
            margin-bottom: 18px;
        }
        .alert-error {
            background: rgba(217,83,79,0.09);
            border: 1px solid rgba(217,83,79,0.22);
            color: #b03030;
        }
        .alert-success {
            background: rgba(76,175,138,0.1);
            border: 1px solid rgba(76,175,138,0.28);
            color: #2e7d5e;
        }
        .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--rose-principal) 0%, var(--rose-fonce) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow:
                0 12px 32px rgba(160,88,112,0.3),
                0 2px 0 rgba(255,255,255,0.2) inset;
            position: relative;
            overflow: hidden;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            animation: slideUp 0.7s 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 42px rgba(160,88,112,0.38), 0 2px 0 rgba(255,255,255,0.2) inset;
        }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active {
            transform: scale(0.985) translateY(0);
            box-shadow: 0 8px 20px rgba(160,88,112,0.28);
        }
        .btn-submit:focus-visible {
            outline: 3px solid var(--rose-tendre);
            outline-offset: 3px;
        }

        /* Loading state */
        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.82;
        }
        .btn-submit .btn-text { transition: opacity 0.2s; }
        .btn-submit .btn-spinner {
            display: none;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%,-50%);
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-submit.loading .btn-text { opacity: 0; }
        .btn-submit.loading .btn-spinner { display: block; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ── Footer row ── */
        .login-row {
            text-align: center;
            margin-top: 18px;
            font-size: 0.82rem;
            color: var(--texte-doux);
            opacity: 0.85;
            animation: slideUp 0.7s 0.48s cubic-bezier(0.22,1,0.36,1) both;
        }
        .login-row a {
            color: var(--rose-principal);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.25s;
        }
        .login-row a:hover { border-color: var(--rose-principal); }
        .login-row a:focus-visible {
            outline: 2px solid var(--rose-principal);
            border-radius: 3px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 18px;
            color: var(--texte-leger);
            font-size: 0.75rem;
            letter-spacing: 1.5px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(194,113,143,0.2));
        }
        .divider::after { transform: scaleX(-1); }

        /* ── RESPONSIVE ── */
        @media (max-width: 780px) {
            body { padding: 16px; align-items: flex-start; }

            .card {
                flex-direction: column;
                max-width: 480px;
                margin: 0 auto;
                border-radius: 30px;
            }

            .panel-image {
                flex: none;
                width: 100%;
                height: 210px;
            }
            .panel-image img { object-position: center 18%; }
            .logo-text { font-size: 2.1rem; letter-spacing: 10px; }
            .panel-badge { display: none; }
            .panel-form { padding: 30px 28px 36px; }
            .form-title { font-size: 1.95rem; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .card { border-radius: 24px; max-width: 100%; }
            .panel-image { height: 185px; }
            .logo-text { font-size: 1.75rem; letter-spacing: 8px; }
            .panel-form { padding: 22px 18px 28px; }
            .form-title { font-size: 1.75rem; }
            .field-row { flex-direction: column; gap: 15px; }
            .field-group { gap: 13px; }
        }

        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: max(24px, env(safe-area-inset-bottom));
                padding-left:   max(10px, env(safe-area-inset-left));
                padding-right:  max(10px, env(safe-area-inset-right));
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <main class="card" role="main">

        <!-- ── IMAGE LEFT PANEL ── -->
        <div class="panel-image" aria-hidden="true">
            <img src="{% static 'image/sana_image15.gif' %}" alt="">
            <div class="panel-badge">espace confidentiel</div>
            <div class="panel-caption">
                <span class="logo-text">SANA</span>
                <span class="logo-sub">soutien &amp; bien-être</span>
            </div>
        </div>

        <!-- ── FORM RIGHT PANEL ── -->
        <div class="panel-form">
            <div class="form-eyebrow" aria-hidden="true">Nouveau compte</div>

            <h1 class="form-title">
                Rejoins<br>
                <em>l'espace SANA.</em>
            </h1>

            <p class="form-desc">
                Crée ton espace personnel, confidentiel et bienveillant.
            </p>

            <!-- Server-side error -->
            {% if error %}
            <div class="alert alert-error" role="alert" aria-live="assertive">
                <span class="alert-icon" aria-hidden="true">⚠️</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form
                id="register-form"
                method="POST"
                action="{% url 'sanasource:register' %}"
                novalidate
                aria-label="Formulaire de création de compte"
            >
                {% csrf_token %}

                <div class="field-group">

                    <!-- Prénom / Nom -->
                    <div class="field-row">
                        <div class="field">
                            <label for="first_name">Prénom <span aria-label="requis" style="color:var(--rose-principal)">*</span></label>
                            <div class="input-wrap">
                                <span class="input-icon" aria-hidden="true">✦</span>
                                <input
                                    type="text"
                                    id="first_name"
                                    name="first_name"
                                    placeholder="Ton prénom"
                                    autocomplete="given-name"
                                    value="{{ first_name|default:'' }}"
                                    required
                                    minlength="2"
                                    aria-describedby="first_name-feedback"
                                    aria-required="true"
                                >
                                <span class="input-status" aria-hidden="true"></span>
                            </div>
                            <span class="field-feedback" id="first_name-feedback" aria-live="polite"></span>
                        </div>

                        <div class="field">
                            <label for="last_name">Nom</label>
                            <div class="input-wrap">
                                <span class="input-icon" aria-hidden="true">✦</span>
                                <input
                                    type="text"
                                    id="last_name"
                                    name="last_name"
                                    placeholder="Ton nom"
                                    autocomplete="family-name"
                                    value="{{ last_name|default:'' }}"
                                    aria-describedby="last_name-feedback"
                                >
                                <span class="input-status" aria-hidden="true"></span>
                            </div>
                            <span class="field-feedback" id="last_name-feedback" aria-live="polite"></span>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="field">
                        <label for="email">Adresse e-mail <span aria-label="requis" style="color:var(--rose-principal)">*</span></label>
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">✉</span>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="ton@email.com"
                                autocomplete="email"
                                inputmode="email"
                                value="{{ email|default:'' }}"
                                required
                                aria-describedby="email-feedback"
                                aria-required="true"
                            >
                            <span class="input-status" aria-hidden="true"></span>
                        </div>
                        <span class="field-feedback" id="email-feedback" aria-live="polite"></span>
                    </div>

                    <!-- Mot de passe -->
                    <div class="field">
                        <label for="password1">Mot de passe <span aria-label="requis" style="color:var(--rose-principal)">*</span></label>
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">🔒</span>
                            <input
                                type="password"
                                id="password1"
                                name="password1"
                                placeholder="8 caractères minimum"
                                autocomplete="new-password"
                                required
                                minlength="8"
                                aria-describedby="password1-feedback password1-strength-label"
                                aria-required="true"
                            >
                            <span class="input-status" aria-hidden="true"></span>
                            <button type="button" class="toggle-pass" data-target="password1" aria-label="Afficher le mot de passe" aria-pressed="false">👁</button>
                        </div>
                        <!-- Strength bar -->
                        <div class="strength-bar" aria-hidden="true" id="strength-bar">
                            <div class="strength-seg" id="seg1"></div>
                            <div class="strength-seg" id="seg2"></div>
                            <div class="strength-seg" id="seg3"></div>
                        </div>
                        <span class="field-feedback" id="password1-feedback" aria-live="polite"></span>
                        <span class="sr-only" id="password1-strength-label" aria-live="polite"></span>
                    </div>

                    <!-- Confirmer -->
                    <div class="field">
                        <label for="password2">Confirmer le mot de passe <span aria-label="requis" style="color:var(--rose-principal)">*</span></label>
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">🔒</span>
                            <input
                                type="password"
                                id="password2"
                                name="password2"
                                placeholder="••••••••"
                                autocomplete="new-password"
                                required
                                aria-describedby="password2-feedback"
                                aria-required="true"
                            >
                            <span class="input-status" aria-hidden="true"></span>
                            <button type="button" class="toggle-pass" data-target="password2" aria-label="Afficher la confirmation" aria-pressed="false">👁</button>
                        </div>
                        <span class="field-feedback" id="password2-feedback" aria-live="polite"></span>
                    </div>

                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="btn-submit" aria-label="Créer mon compte">
                    <span class="btn-text">Créer mon compte</span>
                    <span class="btn-spinner" aria-hidden="true"></span>
                </button>
            </form>

            <div class="login-row">
                Déjà un compte ?
                <a href="{% url 'sanasource:login' %}">Se connecter</a>
            </div>

        </div>
    </main>

    <style>
        .sr-only {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }
    </style>

    <script>
    (() => {
        'use strict';

        // ── Helpers ──────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const setValid = (input, feedback, msg = '') => {
            input.classList.remove('is-error');
            input.classList.add('is-valid');
            feedback.className = 'field-feedback success';
            feedback.textContent = msg;
            const status = input.parentElement.querySelector('.input-status');
            if (status) status.textContent = '✓';
        };
        const setError = (input, feedback, msg) => {
            input.classList.remove('is-valid');
            input.classList.add('is-error');
            feedback.className = 'field-feedback error';
            feedback.textContent = msg;
            const status = input.parentElement.querySelector('.input-status');
            if (status) status.textContent = '';
        };
        const clearState = (input, feedback) => {
            input.classList.remove('is-valid', 'is-error');
            feedback.textContent = '';
            feedback.className = 'field-feedback';
            const status = input.parentElement.querySelector('.input-status');
            if (status) status.textContent = '';
        };

        // ── Password strength ─────────────────────────────────────
        const strengthScore = pwd => {
            let score = 0;
            if (pwd.length >= 8)  score++;
            if (pwd.length >= 12) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            return Math.min(3, Math.ceil(score / 1.5));
        };

        const strengthLabels = ['', 'Faible', 'Moyen', 'Fort'];
        const strengthColors  = ['', 'active-1', 'active-2', 'active-3'];

        const updateStrength = () => {
            const pwd = $('password1').value;
            const score = pwd.length ? strengthScore(pwd) : 0;
            ['seg1','seg2','seg3'].forEach((id, i) => {
                const seg = $(id);
                seg.className = 'strength-seg';
                if (score > i) seg.classList.add(strengthColors[score]);
            });
            $('password1-strength-label').textContent = score
                ? `Force du mot de passe : ${strengthLabels[score]}`
                : '';
        };

        // ── Field validators ──────────────────────────────────────
        const validators = {
            first_name: () => {
                const el = $('first_name');
                const fb = $('first_name-feedback');
                const v  = el.value.trim();
                if (!v) { setError(el, fb, 'Le prénom est requis.'); return false; }
                if (v.length < 2) { setError(el, fb, 'Au moins 2 caractères.'); return false; }
                setValid(el, fb, ''); return true;
            },
            email: () => {
                const el = $('email');
                const fb = $('email-feedback');
                const v  = el.value.trim();
                if (!v) { setError(el, fb, "L'e-mail est requis."); return false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
                    setError(el, fb, 'Adresse e-mail invalide.'); return false;
                }
                setValid(el, fb, ''); return true;
            },
            password1: () => {
                const el = $('password1');
                const fb = $('password1-feedback');
                const v  = el.value;
                if (!v) { setError(el, fb, 'Le mot de passe est requis.'); return false; }
                if (v.length < 8) { setError(el, fb, '8 caractères minimum.'); return false; }
                setValid(el, fb, ''); return true;
            },
            password2: () => {
                const el  = $('password2');
                const fb  = $('password2-feedback');
                const v   = el.value;
                const ref = $('password1').value;
                if (!v) { setError(el, fb, 'La confirmation est requise.'); return false; }
                if (v !== ref) { setError(el, fb, 'Les mots de passe ne correspondent pas.'); return false; }
                setValid(el, fb, 'Mots de passe identiques ✓'); return true;
            }
        };

        // ── Live validation on blur ───────────────────────────────
        ['first_name', 'email', 'password1', 'password2'].forEach(id => {
            const el = $(id);
            if (!el) return;
            el.addEventListener('blur', () => {
                if (el.value.trim()) validators[id]?.();
            });
            el.addEventListener('input', () => {
                if (el.classList.contains('is-error') && el.value.trim()) {
                    validators[id]?.();
                }
                // Re-validate confirm if password1 changes
                if (id === 'password1') {
                    updateStrength();
                    if ($('password2').classList.contains('is-error') || $('password2').value)
                        validators.password2();
                }
            });
        });

        // ── Toggle password visibility ────────────────────────────
        document.querySelectorAll('.toggle-pass').forEach(btn => {
            btn.addEventListener('click', () => {
                const input   = $(btn.dataset.target);
                const visible = input.type === 'password';
                input.type = visible ? 'text' : 'password';
                btn.textContent = visible ? '🙈' : '👁';
                btn.setAttribute('aria-pressed', String(visible));
                btn.setAttribute('aria-label', visible ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
            });
        });

        // ── Form submit ───────────────────────────────────────────
        $('register-form').addEventListener('submit', e => {
            const results = [
                validators.first_name(),
                validators.email(),
                validators.password1(),
                validators.password2()
            ];

            if (results.some(r => !r)) {
                e.preventDefault();
                // Focus first error
                const firstErr = document.querySelector('.field input.is-error');
                if (firstErr) firstErr.focus();
                return;
            }

            // Show loading
            const btn = $('btn-submit');
            btn.classList.add('loading');
        });

    })();
    </script>
</body>
</html>
